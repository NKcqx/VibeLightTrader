# --------------------------------------------------------------------------
# settings.example.yaml — copy to `settings.yaml` (gitignored) and edit.
# Anything here is safe to commit; secrets / personal IDs go in your local
# settings.yaml only. See README "Quick start" for the minimum fields to
# fill in.
# --------------------------------------------------------------------------

opend:
  host: 127.0.0.1
  port: 11111

database:
  path: data/vibe_trader.db
  wal_mode: true

scheduler:
  timezone: America/New_York
  jobs:
    intraday_check:
      cron: "30 9-15 * * mon-fri"
    morning_brief:
      cron: "30 10 * * mon-fri"
    closing_brief:
      cron: "30 16 * * mon-fri"
    # Optional: refresh yfinance fundamentals fixtures (consensus, ratings,
    # news, earnings calendar). Comment out the entry to disable. Runs on
    # weekends too — fundamentals don't care about market hours.
    refresh_fundamentals:
      cron: "0 6 * * *"          # 06:00 ET daily, well before US open

lark:
  cli_path: lark-cli
  identity: bot              # "bot" needs no extra scope; "user" requires login --scope im:message.send_as_user
  receiver:
    type: user                # "user" → DM via --user-id ou_xxx; "chat" → group via --chat-id oc_xxx
    # Lark/Feishu open_id of the receiver (DM target if type=user, group if type=chat).
    # Get yours via `lark-cli auth me --as user` (after `lark-cli auth login`).
    open_id: "ou_REPLACE_ME_WITH_YOUR_OPEN_ID"

signals:
  rsi_overbought: 70
  rsi_oversold: 30
  bollinger_period: 20
  bollinger_std: 2
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  dedupe_window_minutes: 60

logging:
  level: INFO
  file: data/vibe_trader.log

trader:
  # If true, run_intraday_check auto-executes BUY/SELL suggestions
  # through the paper broker and persists Trade/Position rows.
  # If false, suggestions are only shown in the alert card; you confirm
  # them manually via `vibe-trader trade confirm <signal_id>`.
  auto_execute: true
  # Always true in Phase 2 — refuses non-SIMULATE accounts even if
  # OpenD's default account context says otherwise.
  simulate_only: true

  # Active strategy + per-strategy knobs. Only the sub-block matching
  # `type` is consumed; others are dormant and forward-compatible.
  strategy:
    type: llm           # rule | llm | hitl | ensemble    (ensemble lands in C3)

    rule:
      max_position_per_symbol: 200
      critical_size: 100              # threshold-breach BUY/SELL size
      warn_size: 50                   # tech combo BUY/SELL size
      rsi_extreme: 30.0

    # LLM-driven strategy. Three provider modes:
    #
    #   provider=cursor-agent  ← DEFAULT (no API key, uses Cursor IDE login)
    #     1. Run `cursor-agent login` once
    #     2. `cursor-agent status` should say "Logged in as ..."
    #     3. Each cron tick spawns the CLI; takes 30-60s per symbol
    #     4. Quota consumed against your Cursor Pro/Max subscription
    #
    #   provider=anthropic
    #     1. export ANTHROPIC_API_KEY=sk-ant-...
    #
    #   provider=openai_compat (any OpenAI-compatible endpoint)
    #     OpenAI       → export OPENAI_API_KEY=sk-...
    #     DeepSeek     → export DEEPSEEK_API_KEY=sk-...   + base_url=https://api.deepseek.com
    #     Doubao(火山) → export ARK_API_KEY=...           + base_url=https://ark.cn-beijing.volces.com/api/v3
    #     OpenRouter   → export OPENROUTER_API_KEY=sk-or- + base_url=https://openrouter.ai/api/v1
    #     Ollama       → (no key needed)                  + base_url=http://localhost:11434/v1
    #
    # On any LLM error / parse failure / constraint violation we fall back
    # per `fallback_on_error` (default: rule). Every decision is logged
    # to `audit_log_path` (NDJSON, append-only).
    llm:
      provider: cursor-agent          # cursor-agent | anthropic | openai_compat
      model: ""                       # cursor-agent: ""=account default, or "sonnet-4" / "gpt-5" / "auto"
      api_key_env: ""                 # not needed for cursor-agent
      base_url: null                  # required for openai_compat only

      # cursor-agent specific (ignored by other providers).
      cursor_agent_binary: cursor-agent       # PATH name or absolute path
      cursor_agent_workspace: null            # null → cwd at runtime
      cursor_agent_extra_flags: []            # e.g. ['--mode', 'plan'] for safer read-only

      max_tokens: 512                 # ignored by cursor-agent (CLI doesn't expose it)
      temperature: 0.0                # ignored by cursor-agent
      timeout_s: 240                  # cursor-agent typically 30-60s; bump to 240 for safety
      retries: 2                      # reserved (no retry today)
      max_position_per_symbol: 200
      min_trade_size: 10
      min_confidence: 0.6             # below this → demote to HOLD
      fallback_on_error: rule         # rule | hold
      audit_log_path: data/llm_decisions.jsonl
      kline_window: 200               # K-line bars to feed StrategyContext per tick
      cache_seconds: 300              # 0 disables in-memory cache
      max_concurrent: 5               # reserved (today: serial)

    # Human-in-the-Loop. No API key needed — uses your Cursor/Claude
    # subscription. Each event triggers writing a decision packet (markdown)
    # to var_dir; you paste it into Cursor where Claude reads MEMORY +
    # decides; then submit back via:
    #   vibe-trader decide submit <id> --json '<paste>'
    # Set strategy.type: hitl to enable.
    hitl:
      var_dir: var/decisions
      repo_root: null                 # null → rendered using cwd at runtime
      max_position_per_symbol: 200
      min_trade_size: 10
      min_confidence: 0.6

    # Skeleton — C3.
    ensemble:
      strategies: [rule]
      voting: weighted                # majority | weighted | unanimous
      weights:
        rule: 1.0

  # ---- Cross-strategy investor profile ------------------------------------
  # Fed into every LLM prompt and used by rule-side safety nets. Independent
  # of which strategy is active. Default = "Balanced" mid-term tech swing.
  # See docs/mid-term-investing.md for保守 / 平衡 / 进取 ready-made profiles.
  investment_profile:
    enabled: true

    # Horizon & style
    horizon_months_min: 3
    horizon_months_max: 6
    style: growth                     # growth | value | blend | income | speculative
    theme: "AI-infrastructure & cloud-incumbent mid-term swing"

    # Capital & risk
    budget_per_symbol_usd: 50000
    drawdown_tolerance_pct: 20        # max acceptable per-symbol drawdown
    max_concentration_pct: 60         # single-symbol cap as % of total deployed
    cash_reserve_pct: 10              # always-uninvested buffer (informational, M-3)

    # Entry & sizing (scaling-in policy)
    initial_entry_pct: 40             # first buy = 40% of budget; rest reserved for adds
    max_batches: 3                    # max accumulating buys (LLM BUY refused after)
    add_on_dip_pct: 5                 # next add-on requires price ≥5% below avg cost
    add_cooldown_days: 5              # min days between add-on buys
    prefer_dip_buy: true              # bias LLM toward pullback entries
    earnings_blackout_days: 3         # no new positions <N days BEFORE earnings (reserved)

    # Exit
    take_profit_pct: 30               # trim trigger when +N% unrealized
    take_profit_trim_pct: 50          # sell N% of position when triggered
    hard_stop_pct: 20                 # hard SELL when -N% (overrides LLM)
    trailing_stop_pct: null           # null=disabled (reserved)
    min_holding_days: 30              # block voluntary SELL within N days of buy

    # LLM-prompt helpers
    rebalance_cadence_days: 30        # reserved (long-form review prompt cadence)
    valuation_ceiling_pe: null        # null=disabled (reserved)

# ---------------------------------------------------------------------------
# Fundamentals — Wall-Street consensus / news / earnings calendar feed
# ---------------------------------------------------------------------------
# Snapshotted from yfinance via `python scripts/refresh_fundamentals_fixtures.py`
# and read at runtime from the local fixture directory below. The runtime
# never hits yfinance directly — refresh the fixture deliberately, e.g. weekly.
fundamentals:
  source: fixture                   # fixture | none
  fixture_dir: null                 # null = src/vibe_trader/data/fixtures/fundamentals/raw
  max_rating_changes: 20            # how many rating-change rows to load
  max_news: 10                      # how many recent news headlines to load
  prompt_max_changes: 5             # cap rendered into the LLM prompt
  prompt_max_news: 5                # cap rendered into the LLM prompt
