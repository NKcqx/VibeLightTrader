opend:
  host: 127.0.0.1
  port: 11111

database:
  path: data/equity_monitor.db
  wal_mode: true

scheduler:
  timezone: America/New_York
  jobs:
    intraday_check:
      cron: "30 9-15 * * mon-fri"
    morning_brief:
      cron: "30 10 * * mon-fri"
    closing_brief:
      cron: "30 16 * * mon-fri"
    news_pulse:
      cron: "*/30 9-15 * * mon-fri"

lark:
  cli_path: lark-cli
  identity: bot              # "bot" needs no extra scope; "user" requires login --scope im:message.send_as_user
  receiver:
    type: user                # "user" → DM via --user-id ou_xxx; "chat" → group via --chat-id oc_xxx
    open_id: "ou_2870dc0365b841b931f63f9fa769973f"

signals:
  rsi_overbought: 70
  rsi_oversold: 30
  bollinger_period: 20
  bollinger_std: 2
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  dedupe_window_minutes: 60
  news_burst_drop: 3.0
  news_burst_rise: 3.0

logging:
  level: INFO
  file: data/equity_monitor.log

trader:
  # If true, run_intraday_check auto-executes BUY/SELL suggestions
  # through the paper broker and persists Trade/Position rows.
  # If false, suggestions are only shown in the alert card; you confirm
  # them manually via `equity-monitor trade confirm <signal_id>`.
  auto_execute: true
  # Always true in Phase 2 — refuses non-SIMULATE accounts even if
  # OpenD's default account context says otherwise.
  simulate_only: true

  # Active strategy + per-strategy knobs. Only the sub-block matching
  # `type` is consumed; others are dormant and forward-compatible.
  strategy:
    type: rule          # rule | llm | ensemble    (llm/ensemble land in C2/C3)

    rule:
      max_position_per_symbol: 200
      critical_size: 100              # threshold-breach BUY/SELL size
      warn_size: 50                   # tech combo BUY/SELL size
      rsi_extreme: 30.0

    # Skeleton — not active until C2 ships LLMStrategy.
    # Set trader.strategy.type to `llm` and export $ANTHROPIC_API_KEY
    # (or whichever api_key_env points to) to enable.
    llm:
      provider: anthropic             # anthropic | openai_compat
      model: claude-3-5-sonnet-20241022
      api_key_env: ANTHROPIC_API_KEY
      base_url: null                  # required for openai_compat (DeepSeek/Doubao/OpenRouter/Ollama)
      max_tokens: 512
      temperature: 0.0
      timeout_s: 30
      retries: 2
      max_position_per_symbol: 200
      min_trade_size: 10
      min_confidence: 0.6
      fallback_on_error: rule         # rule | hold
      kline_window: 200
      news_window_minutes: 30
      news_top_k: 3
      cache_seconds: 300
      max_concurrent: 5

    # Skeleton — C3.
    ensemble:
      strategies: [rule]
      voting: weighted                # majority | weighted | unanimous
      weights:
        rule: 1.0
